services:
  - type: web
    name: quorion-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ./data/quorion.sqlite
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
